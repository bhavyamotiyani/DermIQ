{% extends "admin/admin_base.html" %}
{% block title %}{{ action }} Product | DermIQ Admin{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card glass-card shadow border-0">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-4">{{ action }} Product</h2>
                    <form method="POST" enctype="multipart/form-data">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Product Name</label>
                                <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Brand</label>
                                <input type="text" name="brand" class="form-control" value="{{ product.brand if product else '' }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Category (e.g., Moisturizer, Serum)</label>
                                <input type="text" name="category" class="form-control" value="{{ product.category if product else '' }}" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Option 1: Upload Product Image</label>
                                <input type="file" name="image_file" class="form-control" accept="image/*">
                                <small class="text-muted">Recommended: Square image, max 5MB.</small>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Option 2: Product Image URL (Alternative)</label>
                                <input type="url" name="image_url" class="form-control" placeholder="https://example.com/image.jpg" value="{{ product.image_url if product else '' }}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Price (₹)</label>
                                <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price if product else 0 }}" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Rating</label>
                                <input type="number" step="0.1" name="rating" class="form-control" value="{{ product.rating if product else 0 }}" max="5" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Suitable For (Skin Type)</label>
                                <input type="text" name="suitable_for" class="form-control" placeholder="Oily, Dry, All" value="{{ product.suitable_for if product else '' }}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Stock Quantity</label>
                                <input type="number" name="stock" class="form-control" value="{{ product.stock if product and product.stock is not none else 100 }}" min="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Status</label>
                                <select name="is_active" class="form-select">
                                    <option value="1" {% if not product or product.is_active %}selected{% endif %}>Active (Visible to users)</option>
                                    <option value="0" {% if product and not product.is_active %}selected{% endif %}>Inactive (Hidden from users)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Target Concerns (Comma separated)</label>
                                <input type="text" name="concerns" class="form-control" placeholder="Acne, Aging, Pigmentation" value="{{ product.concerns if product else '' }}">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Ingredients</label>
                                <textarea name="ingredients" class="form-control" rows="2">{{ product.ingredients if product else '' }}</textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea name="description" class="form-control" rows="3">{{ product.description if product else '' }}</textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary px-4">Save Product</button>
                                <a href="{{ url_for('admin.products') }}" class="btn btn-outline-secondary px-4 ms-2">Cancel</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
