<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Access | DermIQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        :root {
            --admin-primary: #0f172a;
            --admin-accent: #3b82f6;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .admin-login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .admin-brand {
            margin-bottom: 3rem;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .admin-brand .brand-icon {
            width: 45px;
            height: 45px;
            background: var(--admin-accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .admin-brand .brand-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
        }

        .admin-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .admin-input {
            background: rgba(15, 23, 42, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 0.8rem 1.2rem !important;
            color: white !important;
            border-radius: 0.75rem !important;
        }

        .admin-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .admin-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .admin-btn {
            background: var(--admin-accent);
            border: none;
            padding: 1rem;
            font-weight: 700;
            border-radius: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .admin-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>

<body>
    <div class="admin-login-container">
        <!-- Logo and Brand -->
        <a href="/" class="admin-brand">
            <div class="brand-icon">
                <i class="bi bi-droplet-fill"></i>
            </div>
            <span class="brand-text">DermIQ</span>
        </a>

        <!-- Login Card -->
        <div class="admin-card">
            <div class="text-center mb-5">
                <h4 class="fw-bold text-white mb-2">Admin Terminal</h4>
                <p class="text-secondary small mb-0">Identity verification required</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-danger bg-danger bg-opacity-10 border-0 text-danger rounded-3 small mb-4 py-2"
                role="alert">
                <i class="bi bi-exclamation-circle me-2"></i> {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.admin_login') }}">
                <div class="mb-4">
                    <label class="admin-label">Admin ID</label>
                    <input type="email" name="email" class="form-control admin-input" placeholder="email@admin.com"
                        required>
                </div>

                <div class="mb-5">
                    <label class="admin-label">Secret Key</label>
                    <input type="password" name="password" class="form-control admin-input" placeholder="••••••••"
                        required>
                </div>

                <button type="submit" class="btn admin-btn text-white w-100">
                    <i class="bi bi-shield-lock-fill me-2"></i> Authorized Access
                </button>

                <div class="text-center mt-4">
                    <a href="{{ url_for('user.index') }}" class="text-secondary text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i> Back to Homepage
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
